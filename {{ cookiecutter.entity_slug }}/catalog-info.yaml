apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ cookiecutter.app_name | dump }}
  {%- if cookiecutter.description %}
  description: ${{cookiecutter.description | dump}}
  {%- endif %}
spec:
  type: service
  owner: ${{ cookiecutter.owner }}
  lifecycle: experimental
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{ cookiecutter.app_name | dump }} API
spec:
  type: openapi
  lifecycle: experimental
  owner: ${{ cookiecutter.owner }}
  definition: ./public/swagger-spec.json